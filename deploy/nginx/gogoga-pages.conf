# Replace certificate paths and server IP/domain before enabling.

server {
    listen 80;
    server_name pages.gogoga.top app.pages.gogoga.top *.pages.gogoga.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pages.gogoga.top;

    ssl_certificate     /etc/nginx/ssl/pages.gogoga.top.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pages.gogoga.top.key;

    return 302 https://app.pages.gogoga.top$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.pages.gogoga.top;

    ssl_certificate     /etc/nginx/ssl/pages.gogoga.top.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pages.gogoga.top.key;

    client_max_body_size 110m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name ~^(?<slug>[^.]+)\.pages\.gogoga\.top$;

    ssl_certificate     /etc/nginx/ssl/pages.gogoga.top.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pages.gogoga.top.key;

    root /data/gogoga/sites/$slug/current;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
